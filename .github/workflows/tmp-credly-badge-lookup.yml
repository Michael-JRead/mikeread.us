# TEMPORARY workflow: fetches official GIAC badge template pages on Credly
# and prints their og:image URLs to the job log. This branch and file are
# deleted after the lookup completes.
name: Credly badge lookup (temporary)

on:
  push:
    branches: ["claude/tmp-credly-badge-lookup"]

permissions: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch og:image from Credly badge pages
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          fetch() {
            label="$1"; url="$2"
            echo "===== ${label} ====="
            tmp="$(mktemp)"
            code="$(curl -sL -A "$UA" -H "Accept: text/html" -o "$tmp" -w "%{http_code}" "$url" || echo ERR)"
            echo "HTTP ${code} ${url}"
            grep -oE '<meta[^>]+(og:image|twitter:image)[^>]+>' "$tmp" | head -5 || true
            grep -oE 'https://images\.credly\.com/[^"&]+' "$tmp" | sort -u | head -10 || true
            rm -f "$tmp"
          }
          B="https://www.credly.com/org/global-information-assurance-certification-giac/badge"
          I="https://www.credly.com/badges"
          fetch "GDSA-template"  "$B/giac-defensible-security-architecture-gdsa"
          fetch "GCIH-template"  "$B/giac-certified-incident-handler-gcih"
          fetch "GPEN-template"  "$B/giac-penetration-tester-gpen"
          fetch "GCPN-template"  "$B/giac-cloud-penetration-tester-gcpn"
          fetch "GWAPT-template" "$B/giac-web-application-penetration-tester-gwapt"
          fetch "GSEC-template"  "$B/giac-security-essentials-certification-gsec"
          fetch "GDSA-badge"  "$I/9806aa54-3712-41ce-971e-2288791ed4ee"
          fetch "GCIH-badge"  "$I/14e1c816-0163-43f4-9532-36f7f28b921a"
          fetch "GPEN-badge"  "$I/9f9a36c3-3dcd-4f6b-9181-114370433ceb"
          fetch "GCPN-badge"  "$I/de52ebf9-269f-4f13-b695-a490b281eb9d"
          fetch "GWAPT-badge" "$I/dd5b2477-fddc-4e58-ac67-25baff406606"
          fetch "GSEC-badge"  "$I/d283e815-124b-4cb1-ba60-149a1a73bf05"
